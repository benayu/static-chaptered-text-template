<!DOCTYPE html>
<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body class="noselect">

        <nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand"> Reader</a> <!-- Change the header at the top of the page here.-->
  </div>
</nav>
        

        <div class="container">
            <form method="get">
                <div class="form-group" style="margin-top: 1rem;">
                    <div class="row">
                        <div class="col">
                            <select class="form-select" name="chapter"> 
                            <!-- Here is the chapter select. You can change "Chapter 1" to chapter_name. I don't recommend changing "value=chapter_1". -->
                            <option value="chapter_1">Chapter 1</option> 
                            <option value="chapter_2">Chapter 2</option>
                            <option value="chapter_3">Chapter 3</option>
                            <option value="chapter_4">Chapter 4</option>
                            <!-- Copy each line and add if you want more chapters. -->
                            <!-- Example below: -->
                            <!-- <option value="chapter_5"> Chapter_title </option> -->
                            </select>
                        </div>
                        <div class="col">
                            <button type="submit" class="btn btn-primary mb-3">Go</button>
                            </div>
                            </div>
                        </div>

                        
                </form>
            <div class="card content-display">
                <div id="content">
                    <div class="card-body">Select a chapter above.</div>
                </div>
            </div>
        </div>
<script>

function getParameterByName(name, url = window.location.href) {
    name = name.replace(/[\[\]]/g, '\\$&');
    var regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)'),
        results = regex.exec(url);
    if (!results) return null;
    if (!results[2]) return '';
    return decodeURIComponent(results[2].replace(/\+/g, ' '));
}

var content = getParameterByName('chapter');
// Change "Chapter 1/Chapter1.html" to "folder_name/file_name" that is inside your folder.

if (content == "chapter_1") {document.getElementById('content').innerHTML = "<iframe src=\"Chapter 1/Chapter1.html\"></iframe>"}; 
if (content == "chapter_2") {document.getElementById('content').innerHTML = "<iframe src=\"Chapter 2/Chapter2.html\"></iframe>"};
if (content == "chapter_3") {document.getElementById('content').innerHTML = "<iframe src=\"Chapter 3/Chapter3.html\"></iframe>"};
if (content == "chapter_4") {document.getElementById('content').innerHTML = "<iframe src=\"Chapter 4/Chapter4.html\"></iframe>"};

// Copy and paste each line if you want more chapters. Don't forget to add chapter in chapter select.
// Example below:
// if (content == "chapter_5") {document.getElementById('content').innerHTML = "<iframe src=\"folder_name/file_name.html\"></iframe>"};


        </script>
    </body>
</html>
